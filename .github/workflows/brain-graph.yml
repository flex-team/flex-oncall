name: Brain Graph

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build self-contained graph
        run: node brain/build-graph.js brain/graph-standalone.html

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: brain-graph.html
          archive: false
          path: brain/graph-standalone.html
